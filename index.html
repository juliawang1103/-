        .word-en { font-size: clamp(22px, 8vw, 36px); font-weight: 800; color: var(--primary); display: inline-block; vertical-align: middle; word-break: keep-all; overflow-wrap: normal; max-width: 96%; line-height: 1.2; }

</head>

    const sortedDayKeys = Array.from({length: 30}, (_, i) => "Day " + (i+1));
    const appData = JSON.parse(localStorage.getItem(SAVE_KEY)) || { mastery: {}, review: [] };
    let masteryRecords = appData.mastery, reviewList = appData.review;
    let currentDayName = "", shuffledList = [], history = [], hIdx = -1, waitingForClick = false, autoNextTimer = null;

    function sync() { localStorage.setItem(SAVE_KEY, JSON.stringify({ mastery: masteryRecords, review: reviewList })); document.getElementById('review-count').innerText = reviewList.length; }
    function playVoice(text = null) { const t = text || history[hIdx].word.en; const msg = new SpeechSynthesisUtterance(t); msg.lang = 'en-US'; msg.rate = 0.9; window.speechSynthesis.speak(msg); }
    function triggerAutoAI(e, wordOverride = null) { e.stopPropagation(); const word = wordOverride || history[hIdx].word.en; e.currentTarget.href = `https://www.google.com/search?q=${encodeURIComponent(word + ' 的字根字首與造句')}&hl=zh-TW`; }

    function initMenu() {
        const grid = document.getElementById('menu-grid'); grid.innerHTML = "";
        sortedDayKeys.forEach(dKey => {
            const fullKey = Object.keys(allUnits).find(k => k.startsWith(dKey + " ")) || dKey;
            const words = allUnits[fullKey] || [];
            const total = (words.length || 1) * MASTERY_TARGET;
            let cur = 0; if (masteryRecords[fullKey]) Object.values(masteryRecords[fullKey]).forEach(s => cur += s);
            const per = Math.floor((cur / total) * 100);
            const btn = document.createElement('div'); btn.className = 'menu-btn';
            btn.innerHTML = `<div class="menu-header"><h3>${fullKey}</h3><span class="progress-percent">${per}%</span></div><div class="progress-bar-container"><div class="progress-bar-fill" style="width:${per}%"></div></div>`;
            btn.onclick = () => { if(words.length===0) return; currentDayName = fullKey; shuffledList = [...words].sort(() => Math.random() - 0.5); history = []; hIdx = -1; switchTab('quiz'); goNext(); };
            grid.appendChild(btn);
        });
    }

    function resetAllProgress() { if(confirm("確定歸零所有進度？")) { localStorage.clear(); location.reload(); } }
    function switchTab(tab) {
        document.getElementById('nav-menu').classList.toggle('active', tab==='menu'||tab==='quiz');
        document.getElementById('nav-review').classList.toggle('active', tab==='review');
        document.getElementById('view-menu').style.display = tab==='menu'?'block':'none';
        document.getElementById('view-quiz').style.display = tab==='quiz'?'block':'none';
        document.getElementById('view-review').style.display = tab==='review'?'block':'none';
        if(tab==='menu') { document.getElementById('progress-indicator').innerText = "- / -"; initMenu(); }
        if(tab==='review') renderReview();
    }

    function checkQuiz(btn, selected) {
        const q = history[hIdx]; q.choice = selected;
        if(selected === q.word.zh) {
            if (!masteryRecords[currentDayName]) masteryRecords[currentDayName] = {};
            let s = masteryRecords[currentDayName][q.word.en] || 0;
            if (s < MASTERY_TARGET) { masteryRecords[currentDayName][q.word.en] = s + 1; sync(); }
            btn.classList.add('correct'); autoNextTimer = setTimeout(goNext, 400);
        } else {
            btn.classList.add('wrong'); if(!reviewList.some(i => i.en === q.word.en)) { reviewList.push(q.word); sync(); }
            document.querySelectorAll('.opt-btn').forEach(b => { if(b.innerText === q.word.zh) b.classList.add('correct'); });
            setTimeout(() => { waitingForClick = true; }, 150);
        }
    }

    function goNext() { clearTimeout(autoNextTimer); waitingForClick = false; if (hIdx < history.length - 1) { hIdx++; renderQuiz(); } else if (history.length < shuffledList.length) { history.push(generateQuestion(shuffledList[history.length])); hIdx++; renderQuiz(); } else { alert("單元結束"); switchTab('menu'); } }
    function goPrev() { if (hIdx > 0) { hIdx--; renderQuiz(); } }
    function generateQuestion(word) {
        let opts = [word.zh]; const allZh = Object.values(allUnits).flat().map(i => i.zh).filter(z => z);
        while(opts.length < 3) { let r = allZh[Math.floor(Math.random() * allZh.length)]; if(!opts.includes(r)) opts.push(r); }
        return { word, options: opts.sort(() => Math.random() - 0.5), choice: null };
    }
    function renderQuiz() {
        const q = history[hIdx]; document.getElementById('q-word').innerText = q.word.en; document.getElementById('q-pos').innerText = `(${q.word.pos})`; document.getElementById('progress-indicator').innerText = `${hIdx + 1} / ${shuffledList.length}`;
        const isM = reviewList.some(i => i.en === q.word.en); document.getElementById('q-mark').className = isM ? "btn-small marked" : "btn-small";
        const container = document.getElementById('q-options'); container.innerHTML = "";
        q.options.forEach(o => { const btn = document.createElement('button'); btn.className = 'opt-btn'; btn.innerText = o; if(q.choice){ if(o === q.word.zh) btn.classList.add('correct'); if(o === q.choice && o !== q.word.zh) btn.classList.add('wrong'); } btn.onclick = (e) => { e.stopPropagation(); if(!q.choice) checkQuiz(btn, o); }; container.appendChild(btn); });
    }
    function handleGlobalClick() { if (waitingForClick) goNext(); }
    function toggleManualMark() { const q = history[hIdx]; const idx = reviewList.findIndex(i => i.en === q.word.en); if (idx === -1) reviewList.push(q.word); else reviewList.splice(idx, 1); sync(); renderQuiz(); }
    
    let rvIdx = 0, rvShowZh = false;
    function renderReview() {
        const container = document.getElementById('review-container'); if(reviewList.length === 0) { container.innerHTML = `<div style="text-align:center;margin-top:100px;color:#95a5a6;">單字庫目前是空的。</div>`; return; }
        const item = reviewList[rvIdx];
        container.innerHTML = `<div class="card flashcard" onclick="event.stopPropagation(); rvShowZh=!rvShowZh; renderReview()"><button class="btn-small danger" onclick="event.stopPropagation(); removeReview('${item.en}')">移除</button><div><div class="word-en">${item.en}</div></div><div style="margin-top:10px;"><button class="btn-tool" style="padding:8px 12px; border-radius:8px; background:#f0f7ff; border:1px solid #3498db; color:#3498db; font-weight:bold; cursor:pointer;" onclick="event.stopPropagation(); playVoice('${item.en}');">📢 發音</button><a class="btn-tool" style="padding:8px 12px; border-radius:8px; background:#f3f0ff; border:1px solid #d1c4e9; color:#8e44ad; font-weight:bold; text-decoration:none; margin-left:10px;" href="#" target="_blank" rel="noreferrer noopener" onclick="triggerAutoAI(event, '${item.en}')">🔍 字根</a></div><div style="color:#bdc3c7; font-style:italic; font-size:13px; margin: 15px 0;">(${item.pos})</div>${rvShowZh ? `<div class="zh-hint">${item.zh}</div>` : `<div style="margin-top:30px;opacity:0.6;font-size:11px;color:var(--primary);">點擊卡片翻面</div>`}</div><div class="nav-btns"><button class="nav-btn" onclick="event.stopPropagation(); rvIdx=(rvIdx-1+reviewList.length)%reviewList.length; rvShowZh=false; renderReview()">上一張</button><button class="nav-btn next" onclick="event.stopPropagation(); rvIdx=(rvIdx+1)%reviewList.length; rvShowZh=false; renderReview()">下一張</button></div>`;
    }
    function removeReview(en) { reviewList = reviewList.filter(i => i.en !== en); sync(); rvShowZh = false; if (rvIdx >= reviewList.length) rvIdx = 0; renderReview(); }
    initMenu(); sync();
</script>
</body>
</html>
